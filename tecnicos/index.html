<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>SUMIPANEL · Técnicos</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c5cff'/><text x='16' y='22' font-family='Georgia,serif' font-size='18' font-weight='700' fill='%23fff' text-anchor='middle'>T</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0b0d12; --bg-2:#10131a; --panel:#141822; --line:#1f2533;
    --text:#e6e9f2; --muted:#8a93a8; --muted-2:#5b6478;
    --accent:#7c5cff; --ok:#22c55e; --warn:#f5a524; --danger:#ef4444; --info:#38bdf8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
  input,select,textarea{font:inherit;color:inherit;background:#0e1119;border:1px solid var(--line);border-radius:8px;padding:10px 12px;outline:none;width:100%}
  input:focus,textarea:focus{border-color:var(--accent)}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-thumb{background:#232a3a;border-radius:3px}

  /* Mobile-first layout */
  .app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:var(--bg)}
  .topbar{padding:16px 18px;border-bottom:1px solid var(--line);background:var(--bg-2);position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#3b82f6);display:grid;place-items:center;font-weight:800;color:#fff;font-size:14px}
  .brand-name{font-weight:700;letter-spacing:.3px}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#22d3a4,#7c5cff);display:grid;place-items:center;font-weight:700;color:#0b0d12;font-size:12px}
  .user-bar{padding:10px 18px;background:#0e1119;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}

  .tabs{display:flex;gap:0;background:var(--bg-2);border-bottom:1px solid var(--line);position:sticky;top:65px;z-index:4}
  .tab{flex:1;padding:14px 8px;text-align:center;font-size:12px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab .count{display:block;font-size:18px;font-weight:700;margin-top:4px;color:var(--text);text-transform:none;letter-spacing:0}

  .content{flex:1;padding:16px}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty h2{color:var(--text);margin-bottom:6px;font-size:18px}
  .empty p{font-size:13px}

  /* Tarea card */
  .t-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .t-card:active{transform:scale(.98);background:#1a1f2e}
  .t-card.vencida{border-left:3px solid var(--danger)}
  .t-card.hoy{border-left:3px solid var(--warn)}
  .t-card.futuro{border-left:3px solid var(--info)}
  .t-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px}
  .t-card-title{font-size:15px;font-weight:600;line-height:1.3;flex:1}
  .t-card-meta{font-size:12px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .t-pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
  .t-pill.alta{background:rgba(245,165,36,.15);color:#fbbf24}
  .t-pill.media{background:rgba(56,189,248,.15);color:#7dd3fc}
  .t-pill.baja{background:rgba(138,147,168,.15);color:#cbd5e1}
  .t-pill.critica{background:rgba(239,68,68,.15);color:#fca5a5}
  .t-check{width:36px;height:36px;border:2px solid var(--line-2);border-radius:50%;flex:0 0 36px;display:grid;place-items:center;color:var(--muted-2);background:#0e1119}
  .t-check.done{background:var(--ok);border-color:var(--ok);color:#fff}
  .t-check .check-icon{font-size:18px;display:none}
  .t-check.done .check-icon{display:block}

  /* Modal full-screen */
  .modal{position:fixed;inset:0;background:rgba(5,7,12,.85);display:none;flex-direction:column;z-index:100}
  .modal.open{display:flex}
  .modal-head{padding:16px 18px;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1}
  .modal-title{font-size:17px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .modal-body{flex:1;overflow-y:auto;padding:18px;padding-bottom:100px}
  .modal-foot{padding:14px 18px;background:var(--bg-2);border-top:1px solid var(--line);position:sticky;bottom:0;display:flex;gap:8px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.1s;background:var(--bg);border:1px solid var(--line)}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--ok);color:#fff;border-color:transparent}
  .btn-foto{background:var(--accent);color:#fff;border-color:transparent}
  .btn-cancel{background:#2a1418;color:#fca5a5;border-color:#3a1a22}

  .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
  .field{margin-bottom:14px}
  .field input,.field textarea{background:#0e1119;border:1px solid var(--line);color:var(--text)}
  .field textarea{resize:vertical;min-height:80px}

  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.3px}
  .pill.ok{background:rgba(34,197,94,.1);color:#86efac}
  .pill.warn{background:rgba(245,165,36,.1);color:#fbbf24}
  .pill.danger{background:rgba(239,68,68,.1);color:#fca5a5}
  .pill.info{background:rgba(56,189,248,.1);color:#7dd3fc}
  .pill.muted{background:#0e1119;color:var(--muted)}

  .fotos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
  .fotos-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--line)}

  .empty-action{margin-top:14px;background:var(--panel);border:1px dashed var(--line-2);border-radius:12px;padding:20px;text-align:center;color:var(--muted);font-size:13px}

  .camara-input{position:absolute;opacity:0;width:0;height:0}

  .toast-wrap{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
  .toast{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);padding:12px 18px;border-radius:8px;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.4);max-width:340px;animation:slideIn .25s ease}
  .toast.success{border-left-color:var(--ok)}
  .toast.error{border-left-color:var(--danger)}
  @keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

  .login-screen{position:fixed;inset:0;background:var(--bg);display:grid;place-items:center;padding:20px;z-index:200}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:32px 24px;width:100%;max-width:340px}
  .login-card h1{text-align:center;margin:0 0 24px;font-size:22px}
  .login-btn{width:100%;background:linear-gradient(135deg,var(--accent),#3b82f6);color:#fff;padding:13px;border:0;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;margin-top:12px}
  .login-btn:disabled{opacity:.5}
  .login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
  .login-err.show{display:block}

  .comentario{padding:10px 12px;background:#0e1119;border-radius:8px;margin-bottom:6px;border-left:2px solid var(--accent);font-size:13px}
  .comentario .autor{font-weight:600;margin-bottom:2px;font-size:12px}
  .comentario .fecha{font-size:10px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>🔧 SUMIPANEL</h1>
    <div class="login-err" id="loginErr"></div>
    <input type="email" id="loginEmail" placeholder="tu@email.com" autocomplete="email" style="margin-bottom:8px"/>
    <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password" style="margin-bottom:8px"/>
    <button class="login-btn" id="loginBtn">Ingresar</button>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div>
        <div class="brand-name">SUMIPANEL</div>
        <div style="font-size:11px;color:var(--muted)">App Técnicos</div>
      </div>
    </div>
    <div class="user-avatar" id="userAvatar">?</div>
  </div>

  <div class="user-bar">
    <span id="userName">—</span>
    <span style="color:var(--muted);cursor:pointer" id="btnLogout">Cerrar sesión</span>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="hoy" onclick="App.switchTab('hoy')">
      Hoy
      <span class="count" id="countHoy">0</span>
    </div>
    <div class="tab" data-tab="todas" onclick="App.switchTab('todas')">
      Todas
      <span class="count" id="countTodas">0</span>
    </div>
    <div class="tab" data-tab="proyectos" onclick="App.switchTab('proyectos')">
      Proyectos
      <span class="count" id="countProy">0</span>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty"><div class="spinner" style="border:3px solid #1f2533;border-top-color:#7c5cff;border-radius:50%;width:32px;height:32px;margin:0 auto 12px;animation:spin .8s linear infinite"></div>Cargando...</div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-head">
    <div class="modal-title" id="modalTitle">—</div>
    <button onclick="App.closeModal()" style="background:#0e1119;border:1px solid var(--line);border-radius:8px;padding:8px 12px;color:var(--muted);font-size:13px">✕ Cerrar</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-foot" id="modalFoot"></div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const SUPABASE_URL = 'https://smknglmaaihucuwbpewa.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YiYWYPVDeoamy_LnFfs3xw_mtQTqJHP';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let session = null;
let profile = null;
let TAREAS = [];
let PROYECTOS = [];

const fmt = n => (n||0).toLocaleString('es-AR',{maximumFractionDays:0});
const fmtDate = iso => {
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
};
const today = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };

function toast(msg, kind='success'){
  const t = document.createElement('div');
  t.className = 'toast ' + kind;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=> t.remove(), 3500);
}

const App = {
  currentTab: 'hoy',

  async init(){
    document.getElementById('loginBtn').addEventListener('click', ()=> this.doLogin());
    document.getElementById('loginEmail').addEventListener('keypress', e=>{ if(e.key==='Enter') this.doLogin(); });
    document.getElementById('loginPass').addEventListener('keypress', e=>{ if(e.key==='Enter') this.doLogin(); });
    document.getElementById('btnLogout').addEventListener('click', ()=> this.logout());
    // Check existing session
    const { data: { session: s } } = await db.auth.getSession();
    if(s){
      session = s;
      await this.loadProfile();
      if(profile && profile.active) this.enter();
    }
  },

  async doLogin(){
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');
    const btn = document.getElementById('loginBtn');
    errEl.classList.remove('show');
    btn.disabled = true; btn.textContent = 'Ingresando...';
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    btn.disabled = false; btn.textContent = 'Ingresar';
    if(error){
      errEl.textContent = 'Error: ' + (error.message || 'credenciales inválidas');
      errEl.classList.add('show');
      return;
    }
    session = data.session;
    await this.loadProfile();
    if(!profile || !profile.active){
      errEl.textContent = 'Cuenta inactiva o sin perfil';
      errEl.classList.add('show');
      await db.auth.signOut();
      return;
    }
    this.enter();
  },

  async loadProfile(){
    const { data } = await db.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
    profile = data;
  },

  async logout(){
    await db.auth.signOut();
    location.reload();
  },

  enter(){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('userName').textContent = profile.full_name || profile.email;
    document.getElementById('userAvatar').textContent = (profile.full_name||profile.email).slice(0,2).toUpperCase();
    this.loadAll();
  },

  async loadAll(){
    const [tar, pry] = await Promise.all([
      db.from('tareas').select('*, proyectos(codigo, nombre)').order('fecha_limite', {ascending:true, nullsLast:true}),
      db.from('proyectos').select('*').order('nombre')
    ]);
    TAREAS = tar.data || [];
    PROYECTOS = pry.data || [];
    this.renderCounts();
    this.renderTab();
  },

  renderCounts(){
    const t = today();
    let hoy = 0;
    TAREAS.forEach(x=> {
      if(x.estado==='completada' || x.estado==='cancelada') return;
      const fl = x.fecha_limite ? new Date(x.fecha_limite) : null;
      if(fl && fl.toDateString() === t.toDateString()) hoy++;
    });
    document.getElementById('countHoy').textContent = hoy;
    document.getElementById('countTodas').textContent = TAREAS.filter(x=>x.estado!=='completada' && x.estado!=='cancelada').length;
    document.getElementById('countProy').textContent = PROYECTOS.length;
  },

  switchTab(tab){
    this.currentTab = tab;
    document.querySelectorAll('.tab').forEach(el=> el.classList.toggle('active', el.dataset.tab===tab));
    this.renderTab();
  },

  renderTab(){
    const cont = document.getElementById('content');
    if(this.currentTab==='hoy'){
      const t = today();
      const items = TAREAS.filter(x=>{
        if(x.estado==='completada' || x.estado==='cancelada') return false;
        const fl = x.fecha_limite ? new Date(x.fecha_limite) : null;
        if(!fl) return false;
        const d = (fl - t) / 86400000;
        return d <= 0;  // hoy o vencida
      });
      cont.innerHTML = items.length ? items.map(t=> this.tareaCardHTML(t)).join('') : '<div class="empty"><h2>🎉 Al día</h2><p>No tenés tareas pendientes para hoy.</p></div>';
    } else if(this.currentTab==='todas'){
      const items = TAREAS.filter(x=> x.estado!=='completada' && x.estado!=='cancelada');
      cont.innerHTML = items.length ? items.map(t=> this.tareaCardHTML(t)).join('') : '<div class="empty"><h2>✓ Sin pendientes</h2><p>No tenés tareas activas.</p></div>';
    } else {
      // Proyectos
      if(!PROYECTOS.length){ cont.innerHTML = '<div class="empty"><h2>Sin proyectos</h2></div>'; return; }
      cont.innerHTML = PROYECTOS.map(p=>`
        <div class="t-card" onclick="App.verProyecto(${p.id})">
          <div class="t-card-title">${p.nombre}</div>
          <div class="t-card-meta">
            <span class="chip" style="background:#0e1119;padding:2px 8px;border-radius:6px;font-size:11px;border:1px solid var(--line)">${p.codigo}</span>
            <span>${this.estadoLabel(p.estado)}</span>
          </div>
        </div>
      `).join('');
    }
  },

  tareaCardHTML(t){
    const fl = t.fecha_limite ? new Date(t.fecha_limite) : null;
    const tdy = today();
    const dias = fl ? Math.floor((fl - tdy) / 86400000) : null;
    let cls = 'futuro';
    if(dias !== null){
      if(dias < 0) cls = 'vencida';
      else if(dias === 0) cls = 'hoy';
    }
    return `
      <div class="t-card ${cls}" onclick="App.verTarea(${t.id})">
        <div class="t-card-head">
          <div class="t-card-title">${t.titulo}</div>
          <div class="t-check" onclick="event.stopPropagation();App.toggleTarea(${t.id}, this)">
            <span class="check-icon">✓</span>
          </div>
        </div>
        <div class="t-card-meta">
          <span>${t.proyectos?.codigo||''} · ${t.proyectos?.nombre||''}</span>
        </div>
        <div class="t-card-meta" style="margin-top:4px">
          <span class="t-pill ${t.prioridad||'media'}">${t.prioridad||'media'}</span>
          ${fl ? `<span style="color:${dias<0?'#fca5a5':dias===0?'#fbbf24':'#7dd3fc'}">${dias<0?`Vencida hace ${-dias}d`:dias===0?'Vence hoy':`Vence en ${dias}d`} (${fmtDate(fl)})</span>` : ''}
        </div>
      </div>`;
  },

  estadoLabel(e){
    return ({planificacion:'En planificación',en_curso:'En curso',pausado:'Pausado',finalizado:'Finalizado',pendiente:'Pendiente',en_curso_mo:'En curso',completada:'Completada'})[e] || e;
  },

  async toggleTarea(id, btnEl){
    const t = TAREAS.find(x=>x.id===id);
    if(!t) return;
    const next = t.estado==='completada' ? 'pendiente' : 'completada';
    btnEl.classList.toggle('done');
    const { error } = await db.from('tareas').update({ estado: next }).eq('id', id);
    if(error){ btnEl.classList.toggle('done'); toast('Error: '+error.message,'error'); return; }
    t.estado = next;
    toast(next==='completada'?'✓ Tarea completada':'Tarea reabierta');
    this.renderCounts();
    this.renderTab();
  },

  async verTarea(id){
    const t = TAREAS.find(x=>x.id===id);
    if(!t) return;
    // Cargar comentarios
    const { data: comentarios } = await db.from('tarea_comentarios').select('*').eq('tarea_id', id).order('created_at',{ascending:false});
    const html = `
      <div style="margin-bottom:14px">
        <div class="t-pill ${t.prioridad||'media'}" style="display:inline-block">${t.prioridad||'media'}</div>
        ${t.fecha_limite ? `<div class="t-pill" style="display:inline-block;margin-left:6px;background:#0e1119;color:var(--muted)">📅 ${fmtDate(t.fecha_limite)}</div>` : ''}
      </div>
      <div style="background:#0e1119;padding:12px;border-radius:8px;margin-bottom:14px;font-size:13px">
        <div style="color:var(--muted);font-size:11px;margin-bottom:4px">PROYECTO</div>
        <b>${t.proyectos?.codigo||''}</b> · ${t.proyectos?.nombre||''}
      </div>
      ${t.descripcion ? `<div style="margin-bottom:14px"><div class="label">Descripción</div><div style="line-height:1.6">${t.descripcion}</div></div>` : ''}
      <div style="margin-bottom:14px">
        <div class="label">Horas estimadas / reales</div>
        <div>${t.horas_estimadas||0}h / ${t.horas_reales||0}h</div>
      </div>
      <div style="margin-bottom:14px">
        <div class="label">Comentarios (${(comentarios||[]).length})</div>
        ${(comentarios||[]).map(c=>`<div class="comentario"><div class="autor">${c.usuario_id===session.user.id?'Vos':'Equipo'}</div>${c.texto}<div class="fecha">${fmtDate(c.created_at)}</div></div>`).join('') || '<div class="t-meta" style="padding:6px 0">Sin comentarios</div>'}
      </div>
      <div class="field">
        <div class="label">Agregar comentario</div>
        <textarea id="cm_texto" placeholder="Escribí algo..."></textarea>
      </div>
      <div class="field">
        <div class="label">Subir foto del trabajo</div>
        <label class="btn btn-foto" style="display:flex;cursor:pointer">
          📷 Sacar foto / Subir
          <input type="file" accept="image/*" capture="environment" id="cm_foto" class="camara-input" onchange="App.subirFotoTarea(${id}, this)"/>
        </label>
        <div id="cm_foto_preview" class="fotos-grid"></div>
      </div>
    `;
    const done = t.estado==='completada';
    this.openModal(t.titulo, html, [
      {label:'Cerrar', cls:'btn', fn:()=> this.closeModal()},
      done ? {label:'↺ Reabrir', cls:'btn', fn:()=> this.toggleTareaCompleta(id, false)}
           : {label:'✓ Marcar completada', cls:'btn btn-primary', fn:()=> this.toggleTareaCompleta(id, true)}
    ]);
  },

  async toggleTareaCompleta(id, marcar){
    const t = TAREAS.find(x=>x.id===id);
    if(!t) return;
    // Si esta agregando comentario
    const texto = document.getElementById('cm_texto')?.value.trim();
    if(texto){
      await db.from('tarea_comentarios').insert({ tarea_id: id, usuario_id: session.user.id, texto });
    }
    const { error } = await db.from('tareas').update({ estado: marcar ? 'completada' : 'pendiente' }).eq('id', id);
    if(error){ toast('Error: '+error.message,'error'); return; }
    t.estado = marcar ? 'completada' : 'pendiente';
    toast(marcar?'✓ Tarea completada':'Tarea reabierta');
    this.closeModal();
    this.renderCounts();
    this.renderTab();
  },

  async subirFotoTarea(tareaId, input){
    const f = input.files[0];
    if(!f) return;
    if(f.size > 10*1024*1024){ toast('Máx 10MB','error'); return; }
    const path = `tarea-${tareaId}/${Date.now()}-${f.name}`;
    const { error: upErr } = await db.storage.from('compra-fotos').upload(path, f, { upsert: true });
    if(upErr){ toast('Error: '+upErr.message,'error'); return; }
    const { data: pub } = db.storage.from('compra-fotos').getPublicUrl(path);
    // Guardar como comentario con la imagen
    const { error: dbErr } = await db.from('tarea_comentarios').insert({
      tarea_id: tareaId, usuario_id: session.user.id,
      texto: `📷 Foto: <a href="${pub.publicUrl}" target="_blank">${f.name}</a>`
    });
    if(dbErr){ toast('Error: '+dbErr.message,'error'); return; }
    toast('📷 Foto subida','ok');
    document.getElementById('cm_foto_preview').innerHTML = `<img src="${pub.publicUrl}">`;
  },

  verProyecto(id){
    const p = PROYECTOS.find(x=>x.id===id);
    if(!p) return;
    const tareas = TAREAS.filter(t=> t.proyecto_id===id && t.estado!=='completada' && t.estado!=='cancelada');
    const html = `
      ${p.descripcion ? `<div style="margin-bottom:14px;line-height:1.6">${p.descripcion}</div>` : ''}
      <div style="background:#0e1119;padding:12px;border-radius:8px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
          <span class="label" style="margin:0">Avance</span>
          <span style="color:var(--accent);font-weight:600">${p.avance||0}%</span>
        </div>
        <div style="height:6px;background:#1f2533;border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${p.avance||0}%;background:linear-gradient(90deg,var(--accent),#3b82f6)"></div>
        </div>
      </div>
      <div class="label">Tus tareas pendientes en este proyecto (${tareas.length})</div>
      ${tareas.length ? tareas.map(t=>`<div class="t-card" onclick="App.closeModal();setTimeout(()=>App.verTarea(${t.id}),200)">
        <div class="t-card-title" style="font-size:14px">${t.titulo}</div>
      </div>`).join('') : '<div class="t-meta">Sin tareas pendientes</div>'}
    `;
    this.openModal(p.nombre, html, [{label:'Cerrar', cls:'btn', fn:()=> this.closeModal()}]);
  },

  openModal(title, body, buttons){
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = body;
    const foot = document.getElementById('modalFoot');
    foot.innerHTML = '';
    buttons.forEach(b=>{
      const btn = document.createElement('button');
      btn.className = b.cls;
      btn.innerHTML = b.label;
      btn.onclick = b.fn;
      foot.appendChild(btn);
    });
    document.getElementById('modal').classList.add('open');
  },

  closeModal(){
    document.getElementById('modal').classList.remove('open');
  }
};

document.addEventListener('DOMContentLoaded', ()=> App.init());
</script>
</body>
</html>
